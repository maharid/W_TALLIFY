<svg width="680" height="340" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff; font-family: Arial, sans-serif;">

  <!-- Title -->
  <text font-size="15" font-weight="500" x="340" y="36" text-anchor="middle" fill="#1a1a1a">Point-based scoring</text>

  <!-- Table header -->
  <rect x="40" y="54" width="600" height="34" rx="4" fill="#7F77DD" stroke="#534AB7" stroke-width="0.5"/>
  <text font-size="13" font-weight="500" x="160" y="76" text-anchor="middle" fill="#EEEDFE">Criterion</text>
  <text font-size="13" font-weight="500" x="330" y="76" text-anchor="middle" fill="#EEEDFE">Max points</text>
  <text font-size="13" font-weight="500" x="470" y="76" text-anchor="middle" fill="#EEEDFE">Judge's score</text>
  <text font-size="13" font-weight="500" x="590" y="76" text-anchor="middle" fill="#EEEDFE">Points</text>

  <!-- Row 1 -->
  <rect x="40" y="88" width="600" height="34" fill="#f5f5f3" stroke="#d0cfc8" stroke-width="0.5"/>
  <text font-size="13" x="160" y="110" text-anchor="middle" fill="#1a1a1a">Choreography</text>
  <text font-size="13" x="330" y="110" text-anchor="middle" fill="#1a1a1a">15</text>
  <text font-size="13" x="470" y="110" text-anchor="middle" fill="#1a1a1a">13</text>
  <text font-size="13" x="590" y="110" text-anchor="middle" fill="#1a1a1a">13</text>

  <!-- Row 2 -->
  <rect x="40" y="122" width="600" height="34" fill="#ffffff" stroke="#d0cfc8" stroke-width="0.5"/>
  <text font-size="13" x="160" y="144" text-anchor="middle" fill="#1a1a1a">Theme / Concept</text>
  <text font-size="13" x="330" y="144" text-anchor="middle" fill="#1a1a1a">10</text>
  <text font-size="13" x="470" y="144" text-anchor="middle" fill="#1a1a1a">8</text>
  <text font-size="13" x="590" y="144" text-anchor="middle" fill="#1a1a1a">8</text>

  <!-- Row 3 -->
  <rect x="40" y="156" width="600" height="34" fill="#f5f5f3" stroke="#d0cfc8" stroke-width="0.5"/>
  <text font-size="13" x="160" y="178" text-anchor="middle" fill="#1a1a1a">Costume &amp; Props</text>
  <text font-size="13" x="330" y="178" text-anchor="middle" fill="#1a1a1a">5</text>
  <text font-size="13" x="470" y="178" text-anchor="middle" fill="#1a1a1a">4</text>
  <text font-size="13" x="590" y="178" text-anchor="middle" fill="#1a1a1a">4</text>

  <!-- Divider -->
  <line x1="480" y1="196" x2="620" y2="196" stroke="#888" stroke-width="0.5"/>

  <!-- Total row -->
  <rect x="40" y="198" width="600" height="38" fill="#ffffff" stroke="#d0cfc8" stroke-width="0.5"/>
  <text font-size="13" font-weight="500" x="160" y="222" text-anchor="middle" fill="#1a1a1a">Total</text>
  <text font-size="13" font-weight="500" x="330" y="222" text-anchor="middle" fill="#1a1a1a">30</text>
  <rect x="550" y="203" width="76" height="28" rx="6" fill="#1D9E75" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="13" font-weight="500" x="590" y="222" text-anchor="middle" fill="#E1F5EE">25</text>

  <!-- Arrow -->
  <line x1="590" y1="237" x2="590" y2="265" stroke="#888" stroke-width="1.2" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Caption -->
  <text font-size="12" x="340" y="292" text-anchor="middle" fill="#666">All points added together → final score</text>
  <text font-size="12" x="340" y="314" text-anchor="middle" fill="#666">13 + 8 + 4 = 25 out of 30</text>
</svg>
