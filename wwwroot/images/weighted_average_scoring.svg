<svg width="680" height="360" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff; font-family: Arial, sans-serif;">

  <!-- Title -->
  <text font-size="15" font-weight="500" x="340" y="36" text-anchor="middle" fill="#1a1a1a">Weighted average scoring</text>

  <!-- Table header -->
  <rect x="40" y="54" width="600" height="34" rx="4" fill="#D85A30" stroke="#993C1D" stroke-width="0.5"/>
  <text font-size="13" font-weight="500" x="140" y="76" text-anchor="middle" fill="#FAECE7">Criterion</text>
  <text font-size="13" font-weight="500" x="290" y="76" text-anchor="middle" fill="#FAECE7">Avg. score</text>
  <text font-size="13" font-weight="500" x="420" y="76" text-anchor="middle" fill="#FAECE7">Weight</text>
  <text font-size="13" font-weight="500" x="570" y="76" text-anchor="middle" fill="#FAECE7">Weighted score</text>

  <!-- Row 1 -->
  <rect x="40" y="88" width="600" height="34" fill="#f5f5f3" stroke="#d0cfc8" stroke-width="0.5"/>
  <text font-size="13" x="140" y="110" text-anchor="middle" fill="#1a1a1a">Evening Gown</text>
  <text font-size="13" x="290" y="110" text-anchor="middle" fill="#1a1a1a">90</text>
  <rect x="376" y="93" width="88" height="24" rx="12" fill="#EF9F27" stroke="#BA7517" stroke-width="0.5"/>
  <text font-size="12" font-weight="500" x="420" y="110" text-anchor="middle" fill="#412402">10%</text>
  <text font-size="13" x="570" y="110" text-anchor="middle" fill="#1a1a1a">9.0</text>

  <!-- Row 2 -->
  <rect x="40" y="122" width="600" height="34" fill="#ffffff" stroke="#d0cfc8" stroke-width="0.5"/>
  <text font-size="13" x="140" y="144" text-anchor="middle" fill="#1a1a1a">Beauty &amp; Personality</text>
  <text font-size="13" x="290" y="144" text-anchor="middle" fill="#1a1a1a">85</text>
  <rect x="376" y="127" width="88" height="24" rx="12" fill="#EF9F27" stroke="#BA7517" stroke-width="0.5"/>
  <text font-size="12" font-weight="500" x="420" y="144" text-anchor="middle" fill="#412402">20%</text>
  <text font-size="13" x="570" y="144" text-anchor="middle" fill="#1a1a1a">17.0</text>

  <!-- Row 3 -->
  <rect x="40" y="156" width="600" height="34" fill="#f5f5f3" stroke="#d0cfc8" stroke-width="0.5"/>
  <text font-size="13" x="140" y="178" text-anchor="middle" fill="#1a1a1a">Pre-pageant</text>
  <text font-size="13" x="290" y="178" text-anchor="middle" fill="#1a1a1a">90</text>
  <rect x="376" y="161" width="88" height="24" rx="12" fill="#EF9F27" stroke="#BA7517" stroke-width="0.5"/>
  <text font-size="12" font-weight="500" x="420" y="178" text-anchor="middle" fill="#412402">40%</text>
  <text font-size="13" x="570" y="178" text-anchor="middle" fill="#1a1a1a">36.0</text>

  <!-- Divider -->
  <line x1="490" y1="196" x2="630" y2="196" stroke="#888" stroke-width="0.5"/>

  <!-- Total row -->
  <rect x="40" y="198" width="600" height="38" fill="#ffffff" stroke="#d0cfc8" stroke-width="0.5"/>
  <text font-size="13" font-weight="500" x="140" y="222" text-anchor="middle" fill="#1a1a1a">Total</text>
  <rect x="526" y="203" width="100" height="28" rx="6" fill="#1D9E75" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="13" font-weight="500" x="578" y="222" text-anchor="middle" fill="#E1F5EE">62.0</text>

  <!-- Arrow -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <line x1="578" y1="237" x2="578" y2="265" stroke="#888" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Caption -->
  <text font-size="12" x="340" y="292" text-anchor="middle" fill="#666">Each score × its percentage → then all added together</text>
  <text font-size="12" x="340" y="314" text-anchor="middle" fill="#666">9.0 + 17.0 + 36.0 = 62.0 total</text>
</svg>
