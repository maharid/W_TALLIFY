services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tallify-app
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__TallifyDb=server=db;port=3306;database=tallify_db;user=root;password=rootpassword;
      - EmailSettings__Host=smtp.gmail.com
      - EmailSettings__Port=587
      - EmailSettings__Username=your-email@gmail.com
      - EmailSettings__Password=your-app-password
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: tallify-db
    environment:
      - MYSQL_DATABASE=tallify_db
      - MYSQL_ROOT_PASSWORD=rootpassword
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
